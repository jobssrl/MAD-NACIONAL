<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MAD NACIONAL</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        body {
            margin: 0;
            background-color: #CCCCCC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #061933; 
            color: white;
            padding: 15px 30px;
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .company-logo {
            height: 40px; 
            margin-right: 25px;
        }
        
        .header-left h1 {
            font-size: 26px;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .chart-icon {
            margin-right: 10px;
            font-size: 28px;
        }
        
        .chart-icon::before {
            content: "📊"; 
        }

        /* Estilo exacto según imagen de referencia */
        .nav-button {
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.3s;
        }

        .nav-button:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .iframe-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        iframe {
            width: 95vw;
            height: 90vh;
            border: 2px solid #001f3f;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        footer {
            background-color: #001f3f;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            border-radius: 20px;
            margin: 20px;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="company-logo">
            <h1><span class="chart-icon"></span> MAD NACIONAL</h1>
        </div>
        
        <div class="header-right">
           <!-- Botón Clima Laboral -->
<a href="clima.html" class="nav-button">☁️ Clima Laboral 2026</a>

            <!-- Botón Excel -->

               target="_blank" 
               class="nav-button">
                ↓ Descargar Excel
            </a>
        </div>
    </header>

    <div class="iframe-container">
        <iframe 
            src="https://app.powerbi.com/view?r=eyJrIjoiODBkYzYxMjEtNmZiYi00NWE2LWJhOGEtYjYyZTI1YmEzOWE5IiwidCI6IjE0Mzg0YTY2LWEwYWYtNDNjNC1iMDFhLTMxM2FjZjdhYzYyNiIsImMiOjR9"
